name = "wreck-it-worker"
main = "build/worker/shim.mjs"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[build]
command = "cargo install worker-build && worker-build --release"

[vars]
# Set these via `wrangler secret put` or in the Cloudflare dashboard:
#   GITHUB_WEBHOOK_SECRET    – Webhook secret for HMAC-SHA256 verification
#   GITHUB_APP_ID            – Numeric GitHub App ID
#   GITHUB_APP_PRIVATE_KEY   – PEM-encoded RSA private key from the GitHub App
