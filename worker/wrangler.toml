name = "wreck-it-worker"
main = "build/worker/shim.mjs"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[build]
command = "cargo install worker-build && worker-build --release"

[vars]
# Set these via `wrangler secret put` or in the Cloudflare dashboard:
#   GITHUB_WEBHOOK_SECRET    – Webhook secret for HMAC-SHA256 verification
#   GITHUB_APP_ID            – Numeric GitHub App ID
#   GITHUB_APP_PRIVATE_KEY   – PEM-encoded RSA private key from the GitHub App
#   API_TOKEN                – Bearer token for the REST API endpoints
#
# Portal OAuth:
#   GITHUB_CLIENT_ID         – GitHub App client ID (OAuth)
#   GITHUB_CLIENT_SECRET     – GitHub App client secret (OAuth)
#   PORTAL_SESSION_SECRET    – Random secret for session token HMAC

# KV namespace for task and state persistence.
# Create with: wrangler kv namespace create WRECK_IT_STORE
# Then paste the generated id below.
[[kv_namespaces]]
binding = "WRECK_IT_STORE"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[observability]
enabled = true

# Durable Object binding for stateful ralph agents.
# Each ralph context runs as an isolated Durable Object instance with
# co-located SQLite storage, WebSocket support, and alarm scheduling.
[durable_objects]
bindings = [
  { name = "RALPH_AGENT", class_name = "RalphAgent" },
  { name = "SCHEDULER_AGENT", class_name = "SchedulerAgent" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RalphAgent"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["SchedulerAgent"]

# Pulse trigger — cron schedule for injecting entropy.
# Fires every 30 minutes to process registered repositories.
# Tasks with expired cooldowns will be picked up even without webhook events.
[triggers]
crons = ["*/30 * * * *"]
