# Sample workflow: run wreck-it on a cron schedule.
# Copy this file to .github/workflows/ in your project and customise as needed.
#
# wreck-it keeps all its artefacts (.wreck-it.toml, tasks, state) on an orphan
# "wreck-it-state" branch via a git worktree.  The workflow checks out the
# default branch; wreck-it automatically sets up the worktree.
name: wreck-it loop

on:
  schedule:
    # Run every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch: # allow manual triggers

permissions:
  contents: write      # push state branch commits
  pull-requests: write # cloud agents create PRs against the default branch
  issues: write        # wreck-it creates issues to trigger cloud agents

jobs:
  wreck-it:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed to access the state branch

      - name: Run wreck-it headless iteration
        uses: randymarsh77/wreck-it/action@main
        env:
          COPILOT_API_TOKEN: ${{ secrets.COPILOT_API_TOKEN }}
