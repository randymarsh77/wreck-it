# Sample workflow: run wreck-it on a cron schedule.
# Copy this file to .github/workflows/ in your project and customise as needed.
name: wreck-it loop

on:
  schedule:
    # Run every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch: # allow manual triggers

permissions:
  contents: write      # push state commits
  pull-requests: write # create / update PRs

jobs:
  wreck-it:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run wreck-it headless iteration
        uses: randymarsh77/wreck-it/action@main
        with:
          task_file: tasks.json
          max_iterations: '100'
          verify_command: 'cargo test'
        env:
          COPILOT_API_TOKEN: ${{ secrets.COPILOT_API_TOKEN }}
