name: 'wreck-it'
description: 'Run wreck-it ralph loop in headless mode for CI environments'
inputs:
  model_provider:
    description: 'Model provider to use (github-models, copilot, or llama)'
    required: false
    default: 'github-models'
  max_iterations:
    description: 'Maximum number of loop iterations'
    required: false
    default: '100'
  verify_command:
    description: 'Shell command to verify task completion (trusted input only)'
    required: false
  state_branch:
    description: 'Git branch used to persist wreck-it state (orphan branch)'
    required: false
    default: 'wreck-it-state'
runs:
  using: 'docker'
  image: 'docker://ghcr.io/randymarsh77/wreck-it:latest'
  env:
    INPUT_MODEL_PROVIDER: ${{ inputs.model_provider }}
    INPUT_MAX_ITERATIONS: ${{ inputs.max_iterations }}
    INPUT_VERIFY_COMMAND: ${{ inputs.verify_command }}
    INPUT_STATE_BRANCH: ${{ inputs.state_branch }}
