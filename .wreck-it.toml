# wreck-it headless configuration for dogfooding
# This file configures wreck-it to run its own development tasks
# using an agent swarm of ideas/implementer/evaluator agents.
#
# This file lives on the wreck-it-state orphan branch together with the
# task file and persistent state.  Cloud agents are dispatched against the
# default branch.

task_file = "dogfood-tasks.json"
max_iterations = 50
verify_command = "cargo test && cargo clippy -- -D warnings"
state_file = ".wreck-it-state.json"

# Use agent-based evaluation for richer completeness checks
evaluation_mode = "agent_file"
completeness_prompt = "Evaluate whether the task has been completed successfully. Check that: 1) The described changes exist in the codebase, 2) Any new code compiles without errors, 3) All tests pass, 4) The implementation matches the task description. Write the marker file only if all criteria are met."
completion_marker_file = ".task-complete"
