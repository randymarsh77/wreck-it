# Template: engineering-team
#
# A multi-ralph engineering team that uses recurring tasks to continuously
# maintain documentation, manage feature development, research new
# directions, and ensure codebase cohesiveness.
#
# Ralphs:
#   docs                – periodically assesses and updates project documentation
#   features            – monitors feature-dev-tasks.json and proposes new features
#                         when all current work is complete
#   planner             – researches trends and proposes novel features leveraging
#                         project capabilities
#   cohesiveness        – reviews features for integration quality, shared code,
#                         reusable components, and architectural consistency
#   feature-dev         – executes the feature implementation tasks generated by
#                         the features and planner ralphs
#   merge               – resolves merge conflicts on open PRs
#   test-coverage       – analyzes test coverage and writes tests for uncovered areas
#   dependency-updates  – monitors and applies dependency updates and security patches
#   reporter            – generates periodic project status reports

name = "engineering-team"
description = "A multi-ralph engineering team with recurring documentation review, feature management, research planning, cohesiveness review, implementation, test coverage, dependency updates, and status reporting tasks."

[[ralphs]]
name = "docs"
task_file = "docs-tasks.json"
state_file = ".docs-state.json"

[[ralphs]]
name = "features"
task_file = "features-tasks.json"
state_file = ".features-state.json"

[[ralphs]]
name = "planner"
task_file = "planner-tasks.json"
state_file = ".planner-state.json"

[[ralphs]]
name = "cohesiveness"
task_file = "cohesiveness-tasks.json"
state_file = ".cohesiveness-state.json"

[[ralphs]]
name = "feature-dev"
task_file = "feature-dev-tasks.json"
state_file = ".feature-dev-state.json"

[[ralphs]]
name = "merge"
task_file = "merge-tasks.json"
state_file = ".merge-state.json"
command = "merge"
backend = "copilot_cli"

[[ralphs]]
name = "test-coverage"
task_file = "test-coverage-tasks.json"
state_file = ".test-coverage-state.json"

[[ralphs]]
name = "dependency-updates"
task_file = "dependency-updates-tasks.json"
state_file = ".dependency-updates-state.json"

[[ralphs]]
name = "reporter"
task_file = "reporter-tasks.json"
state_file = ".reporter-state.json"

[[ralphs]]
name = "unstuck"
task_file = "unstuck-tasks.json"
state_file = ".unstuck-state.json"
command = "unstuck"
backend = "copilot_cli"
