# Ralph dogfooding workflow: use wreck-it to develop wreck-it.
#
# This workflow runs wreck-it in headless mode using multi-ralph contexts,
# orchestrating an engineering team of recurring agent loops:
#   - docs:     assess and update project documentation
#   - features: assess feature tasks, choose new features when complete
#   - planner:  research trends and propose novel features
#
# All wreck-it artefacts (.wreck-it.toml, task files, state) live on the
# orphan `wreck-it-state` branch via a git worktree.  The workflow checks
# out the default branch, builds wreck-it, then runs each ralph context
# sequentially.
# Cloud agents are dispatched against the default branch.
#
# Required secrets:
#   PAT_TOKEN – Personal Access Token with repo + PR merge permissions
#               (used to push the state branch; also used as fallback for
#               GitHub API calls when the GitHub App is not configured)
#
# Optional secrets (GitHub App authentication):
#   APP_ID          – Numeric GitHub App ID
#   APP_PRIVATE_KEY – PEM-encoded RSA private key for the GitHub App
#
#   When both APP_ID and APP_PRIVATE_KEY are set, all GitHub API actions
#   (comments, issue creation, PR merges) are performed as the app's bot
#   user (e.g. wreck-it[bot]) instead of the PAT owner.  This gives the
#   bot its own identity, avatar, and @-mentionable username.
name: Ralph

on:
  schedule:
    # Run every 10 minutes during active development
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      max_iterations:
        description: "Override max iterations for this run"
        required: false
        default: "5"

concurrency:
  group: ralph-dogfood
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  models: read

jobs:
  ralph:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Configure git for bot commits
        run: |
          git config user.name "wreck-it[bot]"
          git config user.email "wreck-it[bot]@users.noreply.github.com"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          prefix-key: dogfood

      - name: Build wreck-it
        run: cargo build --release

      - name: Run all ralphs
        run: |
          ARGS="--headless --work-dir . --model-provider github-models --ralph all"
          if [ -n "$MAX_ITER" ]; then
            ARGS="$ARGS --max-iterations $MAX_ITER"
          fi
          ./target/release/wreck-it run $ARGS
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          GITHUB_APP_ID: ${{ secrets.APP_ID }}
          GITHUB_APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          MAX_ITER: ${{ inputs.max_iterations }}

      - name: Push state branch
        run: |
          STATE_BRANCH="wreck-it-state"
          if git rev-parse --verify "refs/heads/${STATE_BRANCH}" >/dev/null 2>&1; then
            echo "Pushing state branch '${STATE_BRANCH}'"
            # Fetch the latest remote state so a concurrent run's push does not
            # cause a non-fast-forward rejection.  Merge remote changes if they
            # exist, then push.  If any step fails (e.g. diverged histories),
            # emit a warning rather than failing the workflow – the next run
            # will re-sync state.
            git fetch origin "${STATE_BRANCH}" 2>/dev/null \
              || echo "[wreck-it] warning: failed to fetch state branch — may be a network issue or new branch"
            if git rev-parse --verify "refs/remotes/origin/${STATE_BRANCH}" >/dev/null 2>&1; then
              git merge --ff-only "origin/${STATE_BRANCH}" 2>/dev/null \
                || echo "[wreck-it] warning: state branch histories have diverged — pushing local state; manual reconciliation may be needed"
            fi
            git push origin "${STATE_BRANCH}" || echo "[wreck-it] warning: failed to push state branch — state will sync on next run"
          else
            echo "State branch '${STATE_BRANCH}' does not exist (nothing to push)"
          fi
