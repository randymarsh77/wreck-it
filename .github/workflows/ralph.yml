# Ralph dogfooding workflow: use wreck-it to develop wreck-it.
#
# This workflow runs wreck-it in headless mode using multi-ralph contexts,
# orchestrating an engineering team of recurring agent loops:
#   - docs:     assess and update project documentation
#   - features: assess feature tasks, choose new features when complete
#   - planner:  research trends and propose novel features
#
# All wreck-it artefacts (.wreck-it.toml, task files, state) live on the
# orphan `wreck-it-state` branch via a git worktree.  The workflow checks
# out the default branch, builds wreck-it, seeds initial state if needed,
# then runs each ralph context sequentially.
# Cloud agents are dispatched against the default branch.
#
# Required secrets:
#   PAT_TOKEN – Personal Access Token with repo + PR merge permissions
#               (used to push changes, merge agent PRs, and assign Copilot
#               to issues via GraphQL)
name: Ralph

on:
  schedule:
    # Run every 10 minutes during active development
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      max_iterations:
        description: 'Override max iterations for this run'
        required: false
        default: '5'

concurrency:
  group: ralph-dogfood
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  models: read

jobs:
  ralph:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Configure git for bot commits
        run: |
          git config user.name "wreck-it[bot]"
          git config user.email "wreck-it[bot]@users.noreply.github.com"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          prefix-key: dogfood

      - name: Build wreck-it
        run: cargo build --release

      - name: Seed state branch if needed
        run: |
          STATE_BRANCH="wreck-it-state"
          SEED_DIR=".wreck-it/seed"

          # Ensure the state branch exists locally
          if ! git rev-parse --verify "refs/heads/${STATE_BRANCH}" >/dev/null 2>&1; then
            if git rev-parse --verify "refs/remotes/origin/${STATE_BRANCH}" >/dev/null 2>&1; then
              git branch "${STATE_BRANCH}" "origin/${STATE_BRANCH}"
            fi
          fi

          # Set up the worktree so we can inspect / seed files
          WORKTREE=".wreck-it/state"
          if [ ! -d "${WORKTREE}/.git" ]; then
            mkdir -p "$(dirname "${WORKTREE}")"
            git worktree add "${WORKTREE}" "${STATE_BRANCH}" 2>/dev/null || true
          fi

          if [ -d "${WORKTREE}/.git" ] && [ -d "${SEED_DIR}" ]; then
            SEEDED=false
            for src in "${SEED_DIR}"/*; do
              fname="$(basename "$src")"
              if [ ! -f "${WORKTREE}/${fname}" ]; then
                echo "Seeding ${fname} to state branch"
                cp "$src" "${WORKTREE}/${fname}"
                SEEDED=true
              fi
            done
            if [ "$SEEDED" = true ]; then
              cd "${WORKTREE}"
              git add -A
              git commit -m "wreck-it: seed multi-ralph task files" || true
              cd -
            fi
          fi

      - name: Run docs ralph
        run: |
          ARGS="--headless --work-dir . --model-provider github-models --ralph docs"
          if [ -n "$MAX_ITER" ]; then
            ARGS="$ARGS --max-iterations $MAX_ITER"
          fi
          ./target/release/wreck-it run $ARGS
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          MAX_ITER: ${{ inputs.max_iterations }}

      - name: Run features ralph
        run: |
          ARGS="--headless --work-dir . --model-provider github-models --ralph features"
          if [ -n "$MAX_ITER" ]; then
            ARGS="$ARGS --max-iterations $MAX_ITER"
          fi
          ./target/release/wreck-it run $ARGS
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          MAX_ITER: ${{ inputs.max_iterations }}

      - name: Run planner ralph
        run: |
          ARGS="--headless --work-dir . --model-provider github-models --ralph planner"
          if [ -n "$MAX_ITER" ]; then
            ARGS="$ARGS --max-iterations $MAX_ITER"
          fi
          ./target/release/wreck-it run $ARGS
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          MAX_ITER: ${{ inputs.max_iterations }}

      - name: Push state branch
        run: |
          STATE_BRANCH="wreck-it-state"
          if git rev-parse --verify "refs/heads/${STATE_BRANCH}" >/dev/null 2>&1; then
            echo "Pushing state branch '${STATE_BRANCH}'"
            git push origin "${STATE_BRANCH}"
          else
            echo "State branch '${STATE_BRANCH}' does not exist (nothing to push)"
          fi
