# wreck-it unstuck workflow: scan open PRs for failing CI checks and ask
# @copilot to fix them.
#
# This workflow uses the published Docker image so it can also detect and
# fix failures on the default branch.
#
# Required secrets:
#   PAT_TOKEN – Personal Access Token with repo scope.  Used as fallback
#               for GitHub API calls and for checkout/push operations.
#
# Optional secrets (GitHub App authentication):
#   APP_ID          – Numeric GitHub App ID
#   APP_PRIVATE_KEY – PEM-encoded RSA private key for the GitHub App
#
#   When both are set, GitHub API actions (listing PRs, posting comments)
#   are performed as the app's bot user instead of the PAT owner.
name: Unstuck

on:
  schedule:
    # Run every hour
    - cron: "0 * * * *"
  workflow_dispatch: {}

concurrency:
  group: unstuck
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  models: read

jobs:
  unstuck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Run wreck-it unstuck
        uses: randymarsh77/wreck-it/action@master
        with:
          command: unstuck
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          GITHUB_APP_ID: ${{ secrets.APP_ID }}
          GITHUB_APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
