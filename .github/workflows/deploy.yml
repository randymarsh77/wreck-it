name: Deploy Site

on:
  push:
    branches: [master, main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: site/docs/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('site/docs/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        working-directory: site/docs
        run: npm ci

      - name: Build Docusaurus site
        working-directory: site/docs
        run: npm run build

      - name: Assemble site output
        run: |
          mkdir -p site/output
          cp site/landing/index.html site/output/index.html
          cp -r site/docs/build site/output/docs

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-output
          path: site/output

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v4.3.0
        with:
          name: site-output
          path: site/output

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: wreckit-app
          directory: site/output
