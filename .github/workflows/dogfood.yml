# Dogfood workflow: use wreck-it to develop wreck-it.
#
# This workflow runs wreck-it in headless mode against the dogfood task list,
# orchestrating an agent swarm of ideas/implementer/evaluator agents to
# iteratively improve the codebase.
#
# All wreck-it artefacts (.wreck-it.toml, dogfood-tasks.json, state) live on
# the orphan `wreck-it-state` branch so that state commits don't pollute the
# default branch history or trigger CI.  Cloud agents are dispatched against
# the default branch.
#
# Required secrets:
#   PAT_TOKEN – Personal Access Token with repo + PR merge permissions
#               (used to push changes, merge agent PRs, and assign Copilot
#               to issues — the built-in GITHUB_TOKEN cannot assign Copilot)
name: Dogfood - Agent Swarm

on:
  schedule:
    # Run every 10 minutes during active development
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      max_iterations:
        description: 'Override max iterations for this run'
        required: false
        default: '5'

permissions:
  contents: write
  pull-requests: write
  issues: write
  models: read

jobs:
  dogfood:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # ---- Build wreck-it from the default branch ----
      - name: Checkout default branch (for build)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          prefix-key: dogfood

      - name: Build wreck-it
        run: cargo build --release

      - name: Stash binary
        run: cp target/release/wreck-it /tmp/wreck-it

      # ---- Switch to the state branch ----
      - name: Checkout state branch
        run: |
          if git rev-parse --verify origin/wreck-it-state >/dev/null 2>&1; then
            git checkout wreck-it-state
          else
            echo "State branch does not exist yet — creating orphan branch"
            git checkout --orphan wreck-it-state
            git rm -rf .
            git commit --allow-empty -m "wreck-it: initialize state branch"
          fi

      - name: Configure git for bot commits
        run: |
          git config user.name "wreck-it[bot]"
          git config user.email "wreck-it[bot]@users.noreply.github.com"

      - name: Run wreck-it headless iteration
        run: |
          ARGS="--headless --work-dir . --model-provider github-models"
          if [ -n "$MAX_ITER" ]; then
            ARGS="$ARGS --max-iterations $MAX_ITER"
          fi
          /tmp/wreck-it run $ARGS
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          MAX_ITER: ${{ inputs.max_iterations }}

      - name: Commit and push state changes
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git add -A
            git commit -m "wreck-it: dogfood iteration update"
          fi
          git push origin wreck-it-state
